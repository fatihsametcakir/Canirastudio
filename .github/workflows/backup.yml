name: Günlük Firestore Yedek

on:
  schedule:
    - cron: '0 1 * * *'   # Her gece 01:00 UTC (Türkiye 04:00)
  workflow_dispatch:        # Manuel tetikleme butonu

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Firestore verilerini çek
        env:
          API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, datetime

          api_key = os.environ['API_KEY']
          project_id = os.environ['PROJECT_ID']
          base = f"https://firestore.googleapis.com/v1/projects/{project_id}/databases/(default)/documents"

          collections = ['ogrenciler', 'siniflar', 'odemeler', 'ozelOgrenciler', 'ozelPaketler']

          def fetch_col(col):
              url = f"{base}/{col}?key={api_key}&pageSize=300"
              try:
                  with urllib.request.urlopen(url, timeout=30) as r:
                      data = json.loads(r.read())
                  docs = data.get('documents', [])
                  result = []
                  for doc in docs:
                      obj = {'id': doc['name'].split('/')[-1]}
                      for k, v in doc.get('fields', {}).items():
                          # Basit tip dönüşümü
                          for typ, val in v.items():
                              if typ == 'stringValue': obj[k] = val
                              elif typ == 'integerValue': obj[k] = int(val)
                              elif typ == 'doubleValue': obj[k] = float(val)
                              elif typ == 'booleanValue': obj[k] = val
                              elif typ == 'nullValue': obj[k] = None
                              elif typ == 'arrayValue':
                                  obj[k] = [list(i.values())[0] if i else None
                                            for i in v.get('arrayValue', {}).get('values', [])]
                              elif typ == 'mapValue':
                                  obj[k] = {mk: list(mv.values())[0]
                                            for mk, mv in v.get('mapValue', {}).get('fields', {}).items()}
                      result.append(obj)
                  return result
              except Exception as e:
                  print(f"  HATA {col}: {e}")
                  return []

          backup = {
              'tarih': datetime.datetime.utcnow().isoformat(),
              'versiyon': 1
          }

          for col in collections:
              print(f"  Çekiliyor: {col}")
              backup[col] = fetch_col(col)
              print(f"  → {len(backup[col])} kayıt")

          # Kaydet
          os.makedirs('backups', exist_ok=True)
          tarih = datetime.date.today().isoformat()
          fname = f"backups/{tarih}.json"
          with open(fname, 'w', encoding='utf-8') as f:
              json.dump(backup, f, ensure_ascii=False, indent=2)

          print(f"\nYedek kaydedildi: {fname}")

          # 30 günden eski yedekleri sil
          import glob
          files = sorted(glob.glob('backups/*.json'))
          if len(files) > 30:
              for old in files[:-30]:
                  os.remove(old)
                  print(f"Eski yedek silindi: {old}")
          PYEOF

      - name: Yedekleri commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "Otomatik yedek: $(date +'%Y-%m-%d')"
          git push
